# NetBeans project properties
# Système RH Intelligent - JavaFX FXML (sans Maven)

application.title=Systeme RH Intelligent
application.vendor=ElAbed
application.desc=Système de gestion RH avec analyse IA de CV

build.generated.sources.dir=${build.dir}/generated-sources
debug.modulepath=\
    ${run.modulepath}
debug.test.modulepath=\
    ${run.test.modulepath}
javac.modulepath=lib
javac.processormodulepath=
javac.test.modulepath=\
    ${javac.modulepath}
run.modulepath=\
    ${javac.modulepath}
run.test.modulepath=\
    ${javac.test.modulepath}
src.dir=src
build.dir=out
build.classes.dir=${build.dir}/classes
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
dist.dir=dist
dist.jar=${dist.dir}/systeme-rh.jar
dist.javadoc.dir=${dist.dir}/javadoc
test.src.dir=test

main.class=main.MainApp

# Classpath — pointe vers lib/ local (JARs avec version)
javac.classpath=\
    ${file.reference.javafx-controls};\
    ${file.reference.javafx-fxml};\
    ${file.reference.javafx-base};\
    ${file.reference.javafx-graphics};\
    ${file.reference.mysql-connector};\
    ${file.reference.pdfbox};\
    ${file.reference.pdfbox-io};\
    ${file.reference.fontbox}

run.classpath=\
    ${build.classes.dir};\
    ${javac.classpath}

# VM options pour JavaFX modulaire
run.jvmargs=--module-path lib --add-modules javafx.controls,javafx.fxml -Djava.library.path=lib

# Source/Target Java 17
javac.source=17
javac.target=17
javac.compilerargs=--module-path lib --add-modules javafx.controls,javafx.fxml

# Références fichiers JARs (mis à jour avec les noms réels)
file.reference.javafx-controls=lib/javafx.controls.jar
file.reference.javafx-fxml=lib/javafx.fxml.jar
file.reference.javafx-base=lib/javafx.base.jar
file.reference.javafx-graphics=lib/javafx.graphics.jar
file.reference.mysql-connector=lib/mysql-connector-j-8.3.0.jar
file.reference.pdfbox=lib/pdfbox-3.0.1.jar
file.reference.pdfbox-io=lib/pdfbox-io-3.0.1.jar
file.reference.fontbox=lib/fontbox-3.0.1.jar

includes=**
excludes=
build.classes.excludes=${excludes}
